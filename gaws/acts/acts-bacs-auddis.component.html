<!--
  GAWS-7103: Acts BACS-AUDDIS Migration
  All signals called with () — Angular 20 template signal reads
  Computed values also called with () — exportFileBaseName(), etc.
-->

<section
  class="acts-bacs-auddis-page"
  aria-label="ACTS Auddis Data Job Protocol"
>
  <!-- Page Title — from i18next translation signal -->
  <div class="page-title">
    <h1>{{ title() }}</h1>
  </div>

  <!-- Spinner wraps grid — spinnerVisible() is a Signal -->
  <nz-spin [nzSpinning]="spinnerVisible()">
    <div class="grid-wrapper">
      <app-custom-grid
        [columnDefs]="gridColumns()"
        [rowData]="gridRows()"
        [rowActions]="[]"
        [rowActionsResolver]="rowActionsResolver"
        [showActions]="true"
        [showMenu]="true"
        [showAddButton]="false"
        [isheaderCheckbox]="false"
        [enablePagination]="false"
        [exportFileBaseName]="exportFileBaseName()"
        [gridHeight]="'65vh'"
        (rowActionTriggered)="onRowActionTriggered($event)"
      ></app-custom-grid>
    </div>
  </nz-spin>

  <!-- Load More — outside spinner so always visible -->
  <app-pagination-total
    [totalElements]="totalElements()"
    [buttonDisabled]="loadMoreDisabled() || spinnerVisible()"
    (loadMoreData)="onLoadMore()"
  />
</section>
