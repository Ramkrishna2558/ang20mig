<section class="legacy-shell">
  <form class="legacy-panel" ng-submit="vm.changePassword()">
    <h1>Change Password</h1>
    <label>
      Current password
      <input type="password" ng-model="vm.form.currentPassword" required />
    </label>
    <label>
      New password
      <input type="password" ng-model="vm.form.newPassword" required minlength="8" />
    </label>
    <label>
      Confirm password
      <input type="password" ng-model="vm.form.confirmPassword" required />
    </label>
    <p ng-if="vm.message">{{ vm.message }}</p>
    <div class="legacy-actions">
      <button type="submit">Update password</button>
      <a href="#!/home">Cancel</a>
    </div>
  </form>
</section>
