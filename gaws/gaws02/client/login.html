<section class="legacy-shell">
  <form class="legacy-panel" ng-submit="vm.login()">
    <h1>GAWS Login</h1>
    <label>
      User name
      <input type="text" ng-model="vm.credentials.username" required />
    </label>
    <label>
      Password
      <input type="password" ng-model="vm.credentials.password" required />
    </label>
    <p ng-if="vm.error">{{ vm.error }}</p>
    <div class="legacy-actions">
      <button type="submit">Sign in</button>
    </div>
  </form>
</section>
