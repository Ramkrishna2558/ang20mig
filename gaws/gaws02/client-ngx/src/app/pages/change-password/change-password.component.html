<app-page-panel title="Change Password">
  <form (ngSubmit)="changePassword()">
    <label>
      Current password
      <input
        type="password"
        name="currentPassword"
        [(ngModel)]="form.currentPassword"
        required
      />
    </label>
    <label>
      New password
      <input type="password" name="newPassword" [(ngModel)]="form.newPassword" required />
    </label>
    <label>
      Confirm password
      <input type="password" name="confirmPassword" [(ngModel)]="form.confirmPassword" required />
    </label>
    @if (message()) {
      <p>{{ message() }}</p>
    }
    <div class="actions">
      <button type="submit">Update password</button>
      <a routerLink="/home">Cancel</a>
    </div>
  </form>
</app-page-panel>
